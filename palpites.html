<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palpites - Bolão Quinta Categoria Show</title>
  <link rel="stylesheet" href="css/style.css?v=7">
  <link rel="icon" href="img/quinta-categoria-show-logo.jpg" type="image/jpeg">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="img/quinta-categoria-show-logo.jpg" alt="Logo">
    </a>
    <button class="hamburger" id="hamburger">☰</button>
    <div class="navbar-links" id="nav-links">
      <a href="index.html">Início</a>
      <a href="palpites.html" class="active">Palpites</a>
      <a href="resultados.html">Resultados</a>
      <a href="ranking.html">Ranking</a>
      <a href="historico.html">Histórico</a>
      <a href="perfil.html">Perfil</a>
      <a href="admin.html" id="nav-admin" style="display:none;">Admin</a>
      <a href="#" id="btn-logout">Sair</a>
    </div>
    <div class="navbar-user" id="navbar-user" onclick="window.location.href='perfil.html'"></div>
  </nav>

  <div class="container">
    <h1 class="page-title">PALPITES</h1>

    <div class="round-tabs" id="round-tabs"></div>

    <div id="matches-container">
      <div class="spinner"></div>
      <p class="loading-text">Carregando jogos...</p>
    </div>
  </div>

  <div class="footer">
    Bolão Quinta Categoria Show &mdash; Copa do Mundo 2026 &mdash; Grupo Discípulos de Pai Mei
  </div>

  <div class="modal-overlay" id="confirm-modal" style="display:none;">
    <div class="modal-content">
      <h3>Confirmar Palpite</h3>
      <p id="confirm-modal-text"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btn-cancel-guess">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirm-guess">Confirmar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db, checkAuth, setupNavbar, showToast, formatDate, escapeHtml } from "./js/auth.js?v=7";
    import { getDoc, doc, setDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
    import { parseScoreInput } from "./js/scoring.js?v=7";
    import { getDayKey, getMatchesByDay, isDayLocked, getDayLockInfo, getDayLockCountdown } from "./js/matches.js?v=7";

    let currentUser = null;
    let currentProfile = null;
    let matchesData = [];
    let bracketMatches = {};
    let userGuesses = {};
    let currentDay = null;

    async function init() {
      const { user, profile } = await checkAuth();
      currentUser = user;
      currentProfile = profile;
      setupNavbar(profile);
      await loadData();
      setupDayTabs();
      renderMatches();
    }

    async function loadData() {
      try {
        const response = await fetch("data/matches.json");
        matchesData = await response.json();
        await loadBracketMatches();
        applyBracketMatches();
        const guessSnap = await getDocs(query(collection(db, "guesses"), where("userId", "==", currentUser.uid)));
        userGuesses = {};
        guessSnap.forEach(d => {
          const data = d.data();
          userGuesses[data.matchId] = data;
        });
      } catch (e) {
        showToast("Erro ao carregar jogos", "error");
      }
    }

    async function loadBracketMatches() {
      try {
        const snap = await getDocs(collection(db, "bracketMatches"));
        bracketMatches = {};
        snap.forEach(docSnap => {
          const data = docSnap.data();
          const matchId = data.matchId ?? data.id ?? docSnap.id.replace(/^match_/, "");
          if (matchId !== undefined && matchId !== null) {
            bracketMatches[String(matchId)] = data;
          }
          bracketMatches[docSnap.id] = data;
        });
      } catch (e) {
        console.error("Erro ao carregar bracketMatches", e);
        bracketMatches = {};
      }
    }

    function isKnockout(match) {
      return Boolean(match.stage);
    }

    function sideLabel(match, bracket, side) {
      const status = bracket.status;
      const team = bracket[`${side}Team`];
      const source = bracket[`${side}Source`];
      if (hasResolvedTeam(team)) return team;
      if (status === "pending" || status === "partially_defined") return source || team || match[`${side}Team`];
      return team || source || match[`${side}Team`];
    }

    function hasResolvedTeam(team) {
      const value = String(team || "").trim();
      return Boolean(value)
        && value !== "TBD"
        && value !== "A definir"
        && !/^[12][A-L]$/.test(value)
        && !/^3[A-L](\/[A-L])+$/.test(value)
        && !/^[WL]\d+$/.test(value);
    }

    function isSideResolved(match, side) {
      return hasResolvedTeam(match[`${side}Team`]);
    }

    function loadBracketMatch(match) {
      if (!isKnockout(match)) return match;
      const bracket = bracketMatches[String(match.id)] || bracketMatches[`match_${match.id}`];
      if (!bracket) return match;
      return {
        ...match,
        date: bracket.date || match.date,
        bracketStatus: bracket.status,
        status: bracket.status || match.status,
        homeTeam: sideLabel(match, bracket, "home"),
        awayTeam: sideLabel(match, bracket, "away"),
        homeSource: bracket.homeSource,
        awaySource: bracket.awaySource,
        homeResolved: bracket.homeResolved === true || hasResolvedTeam(bracket.homeTeam),
        awayResolved: bracket.awayResolved === true || hasResolvedTeam(bracket.awayTeam),
        hasBracketMatch: true
      };
    }

    function applyBracketMatches() {
      if (!matchesData?.knockoutMatches) return;
      matchesData = {
        ...matchesData,
        knockoutMatches: matchesData.knockoutMatches.map(loadBracketMatch)
      };
    }

    function isMatchGuessable(match) {
      if (!isKnockout(match)) return true;
      if (match.hasBracketMatch) {
        return isSideResolved(match, "home")
          && isSideResolved(match, "away");
      }
      return hasResolvedTeam(match.homeTeam) && hasResolvedTeam(match.awayTeam);
    }

    function formatDayLabel(dayKey) {
      const [y, m, d] = dayKey.split('-');
      const date = new Date(y, m - 1, d);
      const weekdays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      const months = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
      return `${weekdays[date.getDay()]} ${d} ${months[date.getMonth()]}`;
    }

    function getAllDays() {
      const days = new Map();
      const allMatches = [...matchesData.groupMatches, ...matchesData.knockoutMatches];
      allMatches.forEach(m => {
        const key = getDayKey(m.date);
        if (!days.has(key)) days.set(key, []);
        days.get(key).push(m);
      });
      return Array.from(days.keys()).sort().map(day => ({
        value: day,
        label: formatDayLabel(day),
        matches: days.get(day)
      }));
    }

    function getMatchesForDay(dayKey) {
      return getMatchesByDay(matchesData, dayKey);
    }

    function getLockCountdown(dayKey) {
      const countdown = getDayLockCountdown(matchesData, dayKey);
      if (!countdown) return null;
      const { days, hours, mins, secs } = countdown;
      let str = '';
      if (days > 0) str += `${days}d `;
      str += `${hours}h ${mins}m ${secs}s`;
      return str;
    }

    function setupDayTabs() {
      const tabs = document.getElementById("round-tabs");
      const days = getAllDays();
      if (days.length === 0) return;

      let currentOpenIdx = -1;
      const now = Date.now();

      days.forEach((day, i) => {
        const locked = isDayLocked(matchesData, day.value);
        const btn = document.createElement("button");
        btn.textContent = day.label;
        btn.dataset.day = day.value;

        if (locked) {
          btn.classList.add("tab-locked");
        } else {
          btn.classList.add("tab-open");
          if (currentOpenIdx === -1) currentOpenIdx = i;
        }

        btn.addEventListener("click", () => {
          tabs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentDay = day.value;
          renderMatches();
        });

        tabs.appendChild(btn);
      });

      currentDay = days[currentOpenIdx >= 0 ? currentOpenIdx : 0].value;
      const activeBtn = tabs.querySelector(`[data-day="${currentDay}"]`);
      if (activeBtn) {
        tabs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        activeBtn.classList.add("active");
      }
    }

    function stageLabel(stage) {
      const labels = {
        "round-of-32": "Fase de 32",
        "round-of-16": "Oitavas de Final",
        "quarterfinals": "Quartas de Final",
        "semifinals": "Semifinais",
        "third-place": "3º Lugar",
        "final": "Final"
      };
      return labels[stage] || stage;
    }

    function renderMatches() {
      const container = document.getElementById("matches-container");
      if (!currentDay) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);">Selecione um dia.</p>';
        return;
      }

      const matches = getMatchesForDay(currentDay);
      const locked = isDayLocked(matchesData, currentDay);
      const countdown = getLockCountdown(currentDay);
      const hasGuessableMatches = matches.some(isMatchGuessable);
      let html = "";

      if (countdown) {
        html += `<div style="text-align:center;margin-bottom:16px;">
          <span style="color:var(--text-tertiary);font-size:13px;">Trava em:</span>
          <span class="countdown">${countdown}</span>
        </div>`;
      }

      if (locked) {
        html += `<div style="text-align:center;margin-bottom:16px;padding:12px;background:rgba(212,57,28,0.15);border-radius:8px;color:var(--accent-red);font-weight:600;">🔒 Palpites travados para este dia</div>`;
      } else if (!hasGuessableMatches) {
        html += `<div style="text-align:center;margin-bottom:16px;padding:12px;background:rgba(240,192,64,0.12);border-radius:8px;color:var(--gold);font-weight:600;">Confrontos de mata-mata aguardando definição</div>`;
      } else {
        html += `<div style="text-align:center;margin-bottom:16px;padding:12px;background:rgba(46,204,113,0.1);border-radius:8px;color:var(--success);font-weight:600;">✅ Palpites abertos — preencha e salve!</div>`;
      }

      matches.forEach(m => {
        const existing = userGuesses[m.id];
        const groupLabel = m.group ? `Grupo ${m.group}` : stageLabel(m.stage);
        const homeVal = existing ? existing.homeScore : '';
        const awayVal = existing ? existing.awayScore : '';
        const roundLabel = m.round ? `R${m.round}` : '';
        const disabled = locked || !isMatchGuessable(m);

        html += `<div class="card match-card ${disabled ? 'match-locked' : ''} ${existing ? 'match-has-guess' : ''} animate-fade-in">
          <div class="match-header">
            <span class="match-group-badge">${escapeHtml(`${groupLabel} ${roundLabel}`.trim())}</span>
            <span style="color:var(--text-tertiary);font-size:12px;">${escapeHtml(formatDate(m.date))}</span>
            ${existing && !locked ? '<span style="color:var(--success);font-size:11px;font-weight:600;">✓ Salvo</span>' : ''}
          </div>
          <div class="match-teams">
            <div style="flex:1;text-align:center;">
              <div class="team-name">${escapeHtml(m.homeTeam)}</div>
            </div>
            <div class="score-input" data-match-id="${m.id}">
              <input type="number" min="0" max="30" value="${escapeHtml(homeVal)}" placeholder="-" ${disabled ? 'disabled' : ''} class="home-score" data-match="${m.id}">
              <span class="vs">x</span>
              <input type="number" min="0" max="30" value="${escapeHtml(awayVal)}" placeholder="-" ${disabled ? 'disabled' : ''} class="away-score" data-match="${m.id}">
            </div>
            <div style="flex:1;text-align:center;">
              <div class="team-name">${escapeHtml(m.awayTeam)}</div>
            </div>
          </div>
        </div>`;
      });

      if (!locked && hasGuessableMatches) {
        html += `<div style="text-align:center;margin-top:24px;">
          <button class="btn btn-primary" id="btn-save-all">Salvar Palpites</button>
          ${Object.keys(userGuesses).length > 0 ? ' <button class="btn btn-secondary" id="btn-clear-guesses" style="margin-left:8px;">Limpar Palpites deste Dia</button>' : ''}
        </div>`;
      }

      container.innerHTML = html;

      if (!locked && hasGuessableMatches) {
        const saveBtn = document.getElementById("btn-save-all");
        if (saveBtn) saveBtn.addEventListener("click", handleSaveAll);
        const clearBtn = document.getElementById("btn-clear-guesses");
        if (clearBtn) clearBtn.addEventListener("click", handleClearGuesses);
      }
    }

    async function handleSaveAll() {
      if (isDayLocked(matchesData, currentDay)) {
        showToast("Palpites travados para este dia.", "warning");
        renderMatches();
        return;
      }

      const lockInfo = getDayLockInfo(matchesData, currentDay);
      if (!lockInfo) {
        showToast("Dia inválido para palpites.", "error");
        return;
      }

      const matches = getMatchesForDay(currentDay);
      const guesses = [];
      let hasEmpty = false;
      let hasInvalid = false;

      matches.forEach(m => {
        if (!isMatchGuessable(m)) return;
        const homeInput = document.querySelector(`.home-score[data-match="${m.id}"]`);
        const awayInput = document.querySelector(`.away-score[data-match="${m.id}"]`);
        if (homeInput && awayInput) {
          const homeScore = homeInput.value.trim();
          const awayScore = awayInput.value.trim();
          if (homeScore === "" || awayScore === "") {
            hasEmpty = true;
          } else {
            const parsedHome = parseScoreInput(homeScore);
            const parsedAway = parseScoreInput(awayScore);
            if (parsedHome === null || parsedAway === null) {
              hasInvalid = true;
            } else {
              guesses.push({ matchId: m.id, homeScore: parsedHome, awayScore: parsedAway, homeTeam: m.homeTeam, awayTeam: m.awayTeam });
            }
          }
        }
      });

      if (hasEmpty) {
        showToast("Preencha todos os placares antes de salvar.", "warning");
        return;
      }
      if (hasInvalid) {
        showToast("Use apenas placares inteiros entre 0 e 30.", "warning");
        return;
      }
      if (guesses.length === 0) {
        showToast("Nenhum palpite para salvar.", "warning");
        return;
      }

      const modal = document.getElementById("confirm-modal");
      const textEl = document.getElementById("confirm-modal-text");
      textEl.innerHTML = `Confirmar <strong>${guesses.length}</strong> palpite(s)?<br>Você pode alterar enquanto a rodada estiver aberta.`;
      modal.style.display = "flex";

      document.getElementById("btn-confirm-guess").onclick = async () => {
        modal.style.display = "none";
        try {
          if (isDayLocked(matchesData, currentDay)) {
            showToast("Palpites travados para este dia.", "warning");
            renderMatches();
            return;
          }
          for (const g of guesses) {
            await setDoc(doc(db, "guesses", `${currentUser.uid}_match_${g.matchId}`), {
              userId: currentUser.uid,
              matchId: g.matchId,
              dayKey: lockInfo.dayKey,
              lockAt: lockInfo.lockAt,
              homeTeam: g.homeTeam,
              awayTeam: g.awayTeam,
              homeScore: g.homeScore,
              awayScore: g.awayScore,
              locked: true,
              createdAt: userGuesses[g.matchId]?.createdAt || new Date().toISOString(),
              updatedAt: new Date().toISOString()
            }, { merge: true });
            userGuesses[g.matchId] = { userId: currentUser.uid, matchId: g.matchId, homeTeam: g.homeTeam, awayTeam: g.awayTeam, homeScore: g.homeScore, awayScore: g.awayScore };
          }
          showToast("Palpites salvos! Você pode alterar enquanto estiver aberto.", "success");
          renderMatches();
        } catch (e) {
          showToast("Erro ao salvar palpites: " + e.message, "error");
        }
      };

      document.getElementById("btn-cancel-guess").onclick = () => { modal.style.display = "none"; };
    }

    async function handleClearGuesses() {
      if (isDayLocked(matchesData, currentDay)) {
        showToast("Palpites travados para este dia.", "warning");
        renderMatches();
        return;
      }

      const matches = getMatchesForDay(currentDay);
      const modal = document.getElementById("confirm-modal");
      const textEl = document.getElementById("confirm-modal-text");
      textEl.innerHTML = `Limpar seus palpites deste dia? Você poderá preencher novamente.`;
      modal.style.display = "flex";

      document.getElementById("btn-confirm-guess").onclick = async () => {
        modal.style.display = "none";
        try {
          let cleared = 0;
          for (const m of matches) {
            const guessId = `${currentUser.uid}_match_${m.id}`;
            if (userGuesses[m.id]) {
              await deleteDoc(doc(db, "guesses", guessId));
              delete userGuesses[m.id];
              cleared++;
            }
          }
          showToast(cleared > 0 ? `${cleared} palpite(s) removido(s)!` : "Nenhum palpite para remover.", "success");
          renderMatches();
        } catch (e) {
          showToast("Erro ao limpar palpites: " + e.message, "error");
        }
      };

      document.getElementById("btn-cancel-guess").onclick = () => { modal.style.display = "none"; };
    }

    init();
  </script>
</body>
</html>
