<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palpites - Bolão Quinta Categoria Show</title>
  <link rel="stylesheet" href="css/style.css?v=5">
  <link rel="icon" href="img/quinta-categoria-show-logo.jpg" type="image/jpeg">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="img/quinta-categoria-show-logo.jpg" alt="Logo">
      <span>QCS BOLÃO</span>
    </a>
    <button class="hamburger" id="hamburger">☰</button>
    <div class="navbar-links" id="nav-links">
      <a href="index.html">Início</a>
      <a href="palpites.html" class="active">Palpites</a>
      <a href="resultados.html">Resultados</a>
      <a href="ranking.html">Ranking</a>
      <a href="historico.html">Histórico</a>
      <a href="perfil.html">Perfil</a>
      <a href="admin.html" id="nav-admin" style="display:none;">Admin</a>
      <a href="#" id="btn-logout">Sair</a>
    </div>
    <div class="navbar-user" id="navbar-user" onclick="window.location.href='perfil.html'"></div>
  </nav>

  <div class="container">
    <h1 class="page-title">PALPITES</h1>

    <div class="round-tabs" id="round-tabs"></div>

    <div id="matches-container">
      <div class="spinner"></div>
      <p class="loading-text">Carregando jogos...</p>
    </div>
  </div>

  <div class="footer">
    Bolão Quinta Categoria Show &mdash; Copa do Mundo 2026 &mdash; Grupo Discípulos de Pai Mei
  </div>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="confirm-modal" style="display:none;">
    <div class="modal-content">
      <h3>Confirmar Palpite</h3>
      <p id="confirm-modal-text"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btn-cancel-guess">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirm-guess">Confirmar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db, checkAuth, setupNavbar, showToast, formatDate } from "./js/auth.js?v=5";
    import { getDoc, doc, setDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    let currentUser = null;
    let currentProfile = null;
    let matchesData = [];
    let userGuesses = {};
    let currentDay = null;

    const LOCK_MINUTES = 30;
    const OPEN_HOUR = 6;

    async function init() {
      const { user, profile } = await checkAuth();
      currentUser = user;
      currentProfile = profile;
      setupNavbar(profile);
      await loadData();
      setupDayTabs();
      renderMatches();
    }

    async function loadData() {
      try {
        const response = await fetch("data/matches.json");
        matchesData = await response.json();

        const guessSnap = await getDocs(query(collection(db, "guesses"), where("userId", "==", currentUser.uid)));
        userGuesses = {};
        guessSnap.forEach(d => {
          const data = d.data();
          userGuesses[data.matchId] = data;
        });
      } catch (e) {
        showToast("Erro ao carregar jogos", "error");
      }
    }

    function getDayKey(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function formatDayLabel(dayKey) {
      const [y, m, d] = dayKey.split('-');
      const date = new Date(y, m - 1, d);
      const weekdays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      return `${weekdays[date.getDay()]} ${d}/${m}`;
    }

    function getAllDays() {
      const days = new Map();
      const allMatches = [...matchesData.groupMatches, ...matchesData.knockoutMatches];
      allMatches.forEach(m => {
        const key = getDayKey(m.date);
        if (!days.has(key)) days.set(key, []);
        days.get(key).push(m);
      });
      const sorted = Array.from(days.keys()).sort();
      const result = [];
      for (const day of sorted) {
        const matches = days.get(day);
        result.push({
          value: day,
          label: formatDayLabel(day),
          matches: matches,
          stage: matches[0].stage || matches[0].group
        });
      }
      return result;
    }

    function getMatchesForDay(dayKey) {
      const allMatches = [...matchesData.groupMatches, ...matchesData.knockoutMatches];
      return allMatches.filter(m => getDayKey(m.date) === dayKey);
    }

    function isDayLocked(dayKey) {
      const matches = getMatchesForDay(dayKey);
      if (matches.length === 0) return true;
      const earliestDate = Math.min(...matches.map(m => new Date(m.date).getTime()));
      const lockTime = earliestDate - LOCK_MINUTES * 60 * 1000;
      return Date.now() >= lockTime;
    }

    function isDayOpen(dayKey) {
      const matches = getMatchesForDay(dayKey);
      if (matches.length === 0) return false;
      const earliestDate = Math.min(...matches.map(m => new Date(m.date).getTime()));
      const matchDate = new Date(earliestDate);
      const dayBefore = new Date(dayKey + 'T00:00:00');
      const openTime = new Date(dayBefore.getTime() + OPEN_HOUR * 60 * 60 * 1000);
      return Date.now() >= openTime.getTime();
    }

    function getLockCountdown(dayKey) {
      const matches = getMatchesForDay(dayKey);
      if (matches.length === 0) return null;
      const earliestDate = Math.min(...matches.map(m => new Date(m.date).getTime()));
      const lockTime = earliestDate - LOCK_MINUTES * 60 * 1000;
      const diff = lockTime - Date.now();
      if (diff <= 0) return null;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((diff % (1000 * 60)) / 1000);
      let str = '';
      if (days > 0) str += `${days}d `;
      str += `${hours}h ${mins}m ${secs}s`;
      return str;
    }

    function setupDayTabs() {
      const tabs = document.getElementById("round-tabs");
      const days = getAllDays();
      const now = Date.now();
      let firstOpenIdx = -1;

      days.forEach((day, i) => {
        const btn = document.createElement("button");
        btn.textContent = day.label;
        btn.dataset.day = day.value;

        const locked = isDayLocked(day.value);
        const open = isDayOpen(day.value);

        if (locked) {
          btn.classList.add("tab-locked");
        } else if (open) {
          btn.classList.add("tab-open");
          if (firstOpenIdx === -1) firstOpenIdx = i;
        } else {
          btn.classList.add("tab-future");
        }

        if (i === 0 || (firstOpenIdx === i)) btn.classList.add("active");

        btn.addEventListener("click", () => {
          tabs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentDay = day.value;
          renderMatches();
        });

        tabs.appendChild(btn);
      });

      currentDay = days[firstOpenIdx >= 0 ? firstOpenIdx : 0].value;

      const activeBtn = tabs.querySelector(`[data-day="${currentDay}"]`);
      if (activeBtn) {
        tabs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        activeBtn.classList.add("active");
      }
    }

    function stageLabel(stage) {
      const labels = {
        "round-of-32": "Fase de 32",
        "round-of-16": "Oitavas de Final",
        "quarterfinals": "Quartas de Final",
        "semifinals": "Semifinais",
        "third-place": "3º Lugar",
        "final": "Final"
      };
      return labels[stage] || stage;
    }

    function renderMatches() {
      const container = document.getElementById("matches-container");
      if (!currentDay) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);">Selecione um dia.</p>';
        return;
      }

      const matches = getMatchesForDay(currentDay);
      const locked = isDayLocked(currentDay);
      const open = isDayOpen(currentDay);
      const countdown = getLockCountdown(currentDay);

      let html = "";

      if (!open && !locked) {
        const dayDate = new Date(currentDay + 'T00:00:00');
        const openTime = new Date(dayDate.getTime() + OPEN_HOUR * 60 * 60 * 1000);
        const openLabel = openTime.toLocaleString("pt-BR", { hour: "2-digit", minute: "2-digit" });
        html += `<div style="text-align:center;margin-bottom:16px;padding:16px;background:rgba(244,124,32,0.1);border-radius:8px;">
          <span style="font-size:14px;">⏰ Palpites abrem às <strong>${openLabel}</strong> do dia desta rodada</span>
        </div>`;
        matches.forEach(m => {
          const groupLabel = m.group ? `Grupo ${m.group}` : stageLabel(m.stage);
          html += `<div class="card match-card match-locked animate-fade-in">
            <div class="match-header">
              <span class="match-group-badge">${groupLabel}</span>
              <span style="color:var(--text-tertiary);font-size:12px;">${formatDate(m.date)}</span>
            </div>
            <div class="match-teams">
              <div style="flex:1;text-align:center;"><div class="team-name">${m.homeTeam}</div></div>
              <div class="score-input"><span class="vs">x</span></div>
              <div style="flex:1;text-align:center;"><div class="team-name">${m.awayTeam}</div></div>
            </div>
          </div>`;
        });
        container.innerHTML = html;
        return;
      }

      if (countdown) {
        html += `<div style="text-align:center;margin-bottom:16px;">
          <span style="color:var(--text-tertiary);font-size:13px;">Trava em:</span>
          <span class="countdown">${countdown}</span>
        </div>`;
      }

      if (locked) {
        html += `<div style="text-align:center;margin-bottom:16px;padding:12px;background:rgba(212,57,28,0.15);border-radius:8px;color:var(--accent-red);font-weight:600;">🔒 Palpites travados para esta rodada</div>`;
      }

      matches.forEach(m => {
        const existing = userGuesses[m.id];
        const groupLabel = m.group ? `Grupo ${m.group}` : stageLabel(m.stage);
        const homeVal = existing ? existing.homeScore : '';
        const awayVal = existing ? existing.awayScore : '';

        html += `<div class="card match-card ${locked ? 'match-locked' : ''} ${existing ? 'match-has-guess' : ''} animate-fade-in">
          <div class="match-header">
            <span class="match-group-badge">${groupLabel}</span>
            <span style="color:var(--text-tertiary);font-size:12px;">${formatDate(m.date)}</span>
            ${existing && !locked ? '<span style="color:var(--success);font-size:11px;font-weight:600;">✓ Salvo</span>' : ''}
          </div>
          <div class="match-teams">
            <div style="flex:1;text-align:center;">
              <div class="team-name">${m.homeTeam}</div>
            </div>
            <div class="score-input" data-match-id="${m.id}">
              <input type="number" min="0" max="30" value="${homeVal}" placeholder="-" ${locked ? 'disabled' : ''} class="home-score" data-match="${m.id}">
              <span class="vs">x</span>
              <input type="number" min="0" max="30" value="${awayVal}" placeholder="-" ${locked ? 'disabled' : ''} class="away-score" data-match="${m.id}">
            </div>
            <div style="flex:1;text-align:center;">
              <div class="team-name">${m.awayTeam}</div>
            </div>
          </div>
        </div>`;
      });

      if (!locked && matches.length > 0) {
        html += `<div style="text-align:center;margin-top:24px;">
          <button class="btn btn-primary" id="btn-save-all">Salvar Palpites</button>
          ${Object.keys(userGuesses).length > 0 ? '<button class="btn btn-secondary" id="btn-clear-guesses" style="margin-left:8px;">Limpar Meus Palpites desta Rodada</button>' : ''}
        </div>`;
      }

      container.innerHTML = html;

      if (!locked && matches.length > 0) {
        const saveBtn = document.getElementById("btn-save-all");
        if (saveBtn) saveBtn.addEventListener("click", handleSaveAll);

        const clearBtn = document.getElementById("btn-clear-guesses");
        if (clearBtn) clearBtn.addEventListener("click", handleClearGuesses);
      }
    }

    async function handleSaveAll() {
      const matches = getMatchesForDay(currentDay);
      const guesses = [];
      let hasEmpty = false;

      matches.forEach(m => {
        const homeInput = document.querySelector(`.home-score[data-match="${m.id}"]`);
        const awayInput = document.querySelector(`.away-score[data-match="${m.id}"]`);

        if (homeInput && awayInput) {
          const homeScore = homeInput.value.trim();
          const awayScore = awayInput.value.trim();

          if (homeScore === "" || awayScore === "") {
            hasEmpty = true;
          } else {
            guesses.push({
              matchId: m.id,
              homeScore: parseInt(homeScore),
              awayScore: parseInt(awayScore),
              homeTeam: m.homeTeam,
              awayTeam: m.awayTeam
            });
          }
        }
      });

      if (hasEmpty) {
        showToast("Preencha todos os placares antes de salvar.", "warning");
        return;
      }

      if (guesses.length === 0) {
        showToast("Nenhum palpite para salvar.", "warning");
        return;
      }

      const modal = document.getElementById("confirm-modal");
      const textEl = document.getElementById("confirm-modal-text");
      textEl.innerHTML = `Você está prestes a confirmar <strong>${guesses.length}</strong> palpite(s).<br>Você pode alterar seus palpites enquanto a rodada estiver aberta.<br><br>Confirma?`;
      modal.style.display = "flex";

      document.getElementById("btn-confirm-guess").onclick = async () => {
        modal.style.display = "none";
        try {
          for (const g of guesses) {
            await setDoc(doc(db, "guesses", `${currentUser.uid}_match_${g.matchId}`), {
              userId: currentUser.uid,
              matchId: g.matchId,
              homeTeam: g.homeTeam,
              awayTeam: g.awayTeam,
              homeScore: g.homeScore,
              awayScore: g.awayScore,
              locked: true,
              createdAt: userGuesses[g.matchId]?.createdAt || new Date().toISOString(),
              updatedAt: new Date().toISOString()
            }, { merge: true });
            userGuesses[g.matchId] = {
              userId: currentUser.uid,
              matchId: g.matchId,
              homeTeam: g.homeTeam,
              awayTeam: g.awayTeam,
              homeScore: g.homeScore,
              awayScore: g.awayScore,
              locked: true,
              createdAt: userGuesses[g.matchId]?.createdAt || new Date().toISOString(),
              updatedAt: new Date().toISOString()
            };
          }
          showToast("Palpites salvos! Você pode alterar enquanto a rodada estiver aberta.", "success");
          renderMatches();
        } catch (e) {
          showToast("Erro ao salvar palpites: " + e.message, "error");
        }
      };

      document.getElementById("btn-cancel-guess").onclick = () => {
        modal.style.display = "none";
      };
    }

    async function handleClearGuesses() {
      const matches = getMatchesForDay(currentDay);
      const modal = document.getElementById("confirm-modal");
      const textEl = document.getElementById("confirm-modal-text");
      textEl.innerHTML = `Tem certeza que deseja <strong>limpar</strong> seus palpites desta rodada?<br>Você poderá preencher novamente depois.`;
      modal.style.display = "flex";

      document.getElementById("btn-confirm-guess").onclick = async () => {
        modal.style.display = "none";
        try {
          for (const m of matches) {
            const guessId = `${currentUser.uid}_match_${m.id}`;
            if (userGuesses[m.id]) {
              await deleteDoc(doc(db, "guesses", guessId));
              delete userGuesses[m.id];
            }
          }
          showToast("Palpites limpos com sucesso!", "success");
          renderMatches();
        } catch (e) {
          showToast("Erro ao limpar palpites: " + e.message, "error");
        }
      };

      document.getElementById("btn-cancel-guess").onclick = () => {
        modal.style.display = "none";
      };
    }

    init();
  </script>
</body>
</html>
