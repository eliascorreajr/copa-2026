<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking - Bolão Quinta Categoria Show</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="icon" href="img/quinta-categoria-show-logo.jpg" type="image/jpeg">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="img/quinta-categoria-show-logo.jpg" alt="Logo">
      <span>QCS BOLÃO</span>
    </a>
    <button class="hamburger" id="hamburger">☰</button>
    <div class="navbar-links" id="nav-links">
      <a href="index.html">Início</a>
      <a href="palpites.html">Palpites</a>
      <a href="resultados.html">Resultados</a>
      <a href="ranking.html" class="active">Ranking</a>
      <a href="historico.html">Histórico</a>
      <a href="perfil.html">Perfil</a>
      <a href="admin.html" id="nav-admin" style="display:none;">Admin</a>
      <a href="#" id="btn-logout">Sair</a>
    </div>
    <div class="navbar-user" id="navbar-user" onclick="window.location.href='perfil.html'"></div>
  </nav>

  <div class="container">
    <h1 class="page-title">🏆 RANKING</h1>

    <div id="ranking-container">
      <div class="spinner"></div>
      <p class="loading-text">Carregando ranking...</p>
    </div>
  </div>

  <div class="footer">
    Bolão Quinta Categoria Show &mdash; Copa do Mundo 2026
  </div>

  <script type="module">
    import { auth, db, checkAuth, setupNavbar } from "./js/auth.js?v=4";
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const SCORING = { exactScore: 7, correctResult: 3, wrongResult: -1 };

    async function init() {
      const { user, profile } = await checkAuth();
      setupNavbar(profile);
      await loadRanking();
    }

    async function loadRanking() {
      const container = document.getElementById("ranking-container");

      try {
        const usersSnap = await getDocs(collection(db, "users"));
        const users = {};
        usersSnap.forEach(d => {
          const data = d.data();
          if (data.email === "admin@bolao.com") return;
          users[d.id] = data;
        });

        const guessesSnap = await getDocs(collection(db, "guesses"));
        const matchesSnap = await getDocs(collection(db, "matches"));
        const results = {};
        matchesSnap.forEach(d => {
          const data = d.data();
          if (data.status === "finished" || data.homeScore !== null) {
            results[data.matchId || d.id] = data;
          }
        });

        const rankings = Object.entries(users).map(([uid, userData]) => {
          let totalPoints = 0;
          let exactCount = 0;
          let correctCount = 0;
          let wrongCount = 0;

          guessesSnap.forEach(g => {
            const guess = g.data();
            if (guess.userId !== uid) return;
            const result = results[guess.matchId];
            if (!result || result.homeScore === null || result.homeScore === undefined) return;

            const guessHome = guess.homeScore;
            const guessAway = guess.awayScore;
            const resultHome = result.homeScore;
            const resultAway = result.awayScore;

            if (guessHome === resultHome && guessAway === resultAway) {
              totalPoints += SCORING.exactScore;
              exactCount++;
            } else if (
              (guessHome > guessAway && resultHome > resultAway) ||
              (guessHome < guessAway && resultHome < resultAway) ||
              (guessHome === guessAway && resultHome === resultAway)
            ) {
              totalPoints += SCORING.correctResult;
              correctCount++;
            } else {
              totalPoints += SCORING.wrongResult;
              wrongCount++;
            }
          });

          return {
            uid,
            ...userData,
            totalPoints,
            exactCount,
            correctCount,
            wrongCount
          };
        });

        rankings.sort((a, b) => b.totalPoints - a.totalPoints);

        let html = `<div class="card"><table class="ranking-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Participante</th>
              <th style="text-align:center;">🎯</th>
              <th style="text-align:center;">✓</th>
              <th style="text-align:center;">✗</th>
              <th style="text-align:right;">Pts</th>
            </tr>
          </thead>
          <tbody>`;

        rankings.forEach((r, i) => {
          const pos = i + 1;
          let posClass = "";
          let rowClass = "";
          let trophy = "";

          if (pos === 1) { posClass = "gold"; rowClass = "ranking-row-gold"; trophy = "🏆"; }
          else if (pos === 2) { posClass = "silver"; rowClass = "ranking-row-silver"; trophy = "🥈"; }
          else if (pos === 3) { posClass = "bronze"; rowClass = "ranking-row-bronze"; trophy = "🥉"; }

          const avatar = r.photoURL
            ? `<img src="${r.photoURL}" alt="${r.nickname}">`
            : `<div class="placeholder-avatar">${(r.firstName || r.nickname || "?")[0].toUpperCase()}</div>`;

          html += `<tr class="${rowClass}">
            <td class="ranking-position ${posClass}">${trophy || pos}</td>
            <td><div class="ranking-user">${avatar}<div><div class="ranking-nickname">${r.nickname || r.email}</div><div class="ranking-fullname">${r.firstName ? r.firstName + " " + (r.lastName || "") : ""}</div></div></div></td>
            <td style="text-align:center;font-size:13px;">${r.exactCount}</td>
            <td style="text-align:center;font-size:13px;">${r.correctCount}</td>
            <td style="text-align:center;font-size:13px;">${r.wrongCount}</td>
            <td class="ranking-points ${r.totalPoints >= 0 ? 'positive' : 'negative'}">${r.totalPoints}</td>
          </tr>`;
        });

        html += `</tbody></table></div>`;
        container.innerHTML = html;

      } catch (e) {
        container.innerHTML = `<p style="text-align:center;color:var(--accent-red);">Erro ao carregar ranking: ${e.message}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
